<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisión Familiar</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<button onclick="history.back()">⬅ Volver</button>

<h2>👨‍👩‍👧 Supervisión Familiar</h2>

<!-- 🔐 LOGIN PADRES -->
<div id="loginFamilia">
    <input id="claveFamilia" type="password" placeholder="Introduce clave (1234)">
    <button id="btnEntrar">Entrar</button>
    <p id="errorClave"></p>
</div>

<!-- 📊 PANEL -->
<div id="familia" style="display:none;"></div>

<script type="module">
import { iniciarFamilia } from "./js/familia.js";

document.getElementById("btnEntrar").onclick = async () => {
    const clave = document.getElementById("claveFamilia").value;

    if (clave === "1234") {
        document.getElementById("loginFamilia").style.display = "none";
        document.getElementById("familia").style.display = "block";

        await iniciarFamilia();
    } else {
        document.getElementById("errorClave").innerText =
            "❌ Clave incorrecta";
    }
};
</script>

</body>
</html>
