<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Peque Aula - Juego</title>

<link rel="stylesheet" href="css/style.css">

<style>

#pregunta{
    font-size:32px;
    font-weight:bold;
    margin:25px 0;
}

#zona{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
}

#respuesta{
    display:block;
    margin:15px auto;
}

#zona button{
    display:block;
    margin:8px auto;
}

</style>

</head>

<body>

<button onclick="history.back()" class="btn-volver">
⬅ Volver
</button>

<div class="contenedor-principal">

    <h1 class="titulo-app">
        PEQUE AULA
    </h1>

    <h2 id="tituloJuego"></h2>

    <div id="score">
        Puntos: 0
    </div>

    <div id="pregunta"></div>

    <div id="zona"></div>

    <input id="respuesta">

    <button id="btnComprobar">
        Comprobar
    </button>

    <p id="resultado"></p>

</div>

<script type="module">

import {
    iniciarJuego,
    comprobar
} from "./js/juegos-master.js";

const params = new URLSearchParams(window.location.search);

const materia =
    params.get("materia") || "matematicas";

const nivel =
    params.get("nivel") || "1";

/* Primera letra mayúscula */
const materiaBonita =
    materia.charAt(0).toUpperCase() +
    materia.slice(1);

document.getElementById("tituloJuego").innerText =
    materiaBonita + " - Nivel " + nivel;

iniciarJuego(materia + nivel);

document.getElementById("btnComprobar").onclick =
    comprobar;

document.getElementById("respuesta")
.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){
        comprobar();
    }

});

</script>

</body>
</html>
