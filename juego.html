<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego</title>

<link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive-fix.css">

<style>
body{
    text-align:center;
}

#pregunta{
    font-size:24px;
    margin:20px;
}

#zona button{
    display:block;
    margin:8px auto;
}

/* INPUT CENTRADO */
#respuesta{
    display:block;
    width:250px;
    margin:15px auto;
}

/* BOTÓN CENTRADO */
#btnComprobar{
    display:block;
    margin:10px auto;
}
</style>

</head>

<body>

<button onclick="history.back()" class="btn-volver">
    ⬅ Volver
</button>

<h2 id="tituloJuego"></h2>

<div id="score">
    Puntos: 0
</div>

<div id="pregunta"></div>

<div id="zona"></div>

<input id="respuesta">

<button id="btnComprobar">
    Comprobar
</button>

<p id="resultado"></p>

<script type="module">
import { iniciarJuego, comprobar } from "./js/juegos-master.js";

const params = new URLSearchParams(window.location.search);

const materia = params.get("materia") || "matematicas";
const nivel = params.get("nivel") || "1";

document.getElementById("tituloJuego").innerText =
    materia + " nivel " + nivel;

iniciarJuego(materia + nivel);

document.getElementById("btnComprobar").onclick = comprobar;

document.getElementById("respuesta").addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        comprobar();
    }
});
</script>

</body>
</html>
