<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego</title>
<link rel="stylesheet" href="css/style.css">

<style>
    .memory-card {
        width: 100px;
        height: 100px;
        background: white;
        border: 2px solid #333;
        margin: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        cursor: pointer;
        border-radius: 10px;
    }
</style>
</head>
<body>

<header class="topbar menu-topbar">
    <span class="logo menu-logo">PEQUE AULA 🌟</span>
</header>

<h2 class="center menu-subtitle" id="tituloJuego"></h2>

<div class="game-box">

    <!-- ESTE ES EL BUENO -->
    <div id="pregunta"></div>

    <!-- Contenedor secundario -->
    <div id="zona"></div>

    <!-- Input solo para texto/quiz -->
    <input id="respuesta" type="text">

    <button class="btn-primary" onclick="comprobar()">Comprobar</button>

    <p id="resultado"></p>

</div>

<script src="js/firebase-config.js" type="module"></script>
<script src="js/juegos-master.js" type="module"></script>

<script>
const p = new URLSearchParams(location.search);
const materia = p.get("materia");
const nivel = p.get("nivel");

document.getElementById("tituloJuego").innerText =
    materia.toUpperCase() + " - Nivel " + nivel;

window.onload = () => {
    iniciarJuego(materia + nivel);

    if (nivel === "3" && (materia === "ingles" || materia === "ciencias")) {
        document.getElementById("respuesta").style.display = "none";
    }
};
</script>

</body>
</html>
