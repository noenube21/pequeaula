<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<header class="topbar">
    <span class="logo">PEQUE AULA 🌟</span>
</header>

<h2 id="tituloJuego" class="titulo-juego"></h2>

<div class="game-box">

    <div id="pregunta" class="pregunta"></div>

    <div id="zona"></div>

    <input id="respuesta" type="text" placeholder="Escribe tu respuesta">

    <button id="btnComprobar">Comprobar</button>

    <!-- ⭐ ESTABA MAL ESCRITO -->
    <p id="resultado"></p>
</div>

<!-- ⭐ VARIABLES GLOBALES PARA EL JUEGO (NECESARIAS PARA REGISTRO) -->
<script>
    const paramsJuego = new URLSearchParams(location.search);
    var materia = paramsJuego.get("materia");
    var nivel   = paramsJuego.get("nivel");
</script>

<script type="module">
    import { iniciarJuego, comprobar } from "./js/juegos-master.js";

    document.getElementById("tituloJuego").innerText =
        materia.toUpperCase() + " - Nivel " + nivel;

    iniciarJuego(materia + nivel);

    document.getElementById("btnComprobar").onclick = comprobar;
</script>

</body>
</html>
