<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<h2 id="tituloJuego"></h2>
<div id="score">Puntos: 0</div>

<div class="game-box">
    <div id="pregunta"></div>
    <div id="zona"></div>
    <input id="respuesta" type="text">
    <button id="btnComprobar">Comprobar</button>
    <p id="resultado"></p>
</div>

<script type="module">

import { iniciarJuego, comprobar, cargarDesdeFirebase } from "./js/juegos-master.js";

// ✅ AHORA ES ASYNC (CLAVE)
window.onload = async () => {

    const params = new URLSearchParams(window.location.search);

    const materia = params.get("materia") || "castellano";
    const nivel = params.get("nivel") || "1";

    const key = materia + nivel;

    console.log("KEY FINAL:", key);

    document.getElementById("tituloJuego").innerText =
        materia.toUpperCase() + " - Nivel " + nivel;

    // ✅ NUEVO: cargar progreso desde Firebase
    await cargarDesdeFirebase();

    // ✅ luego iniciar juego
    iniciarJuego(key);

    // ✅ botón comprobar
    document.getElementById("btnComprobar").onclick = comprobar;
};

</script>

</body>
</html>
