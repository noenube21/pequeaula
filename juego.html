<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-box {
            width: 500px;
            max-width: 90%;
        }

        #pregunta {
            font-size: 22px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #zona button {
            display: block;
            width: 80%;
            margin: 8px auto;
        }

        #respuesta {
            width: 80%;
            margin: 10px auto;
            display: block;
        }
    </style>

</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<h2 id="tituloJuego"></h2>

<div id="score">Puntos: 0</div>

<div class="game-box">

    <div id="pregunta"></div>

    <div id="zona"></div>

    <input id="respuesta" type="text">

    <button id="btnComprobar">Comprobar</button>

    <p id="resultado"></p>

</div>

<script type="module">

import { iniciarJuego, comprobar, cargarFirebase } from "./js/juegos-master.js";
import { auth } from "./firebase-config.js";

// ✅ ESPERAR A QUE EL USUARIO ESTÉ LOGUEADO
function esperarUsuario(){

    return new Promise(resolve => {

        const intervalo = setInterval(() => {

            if(auth.currentUser){
                clearInterval(intervalo);
                resolve(auth.currentUser);
            }

        }, 100); // revisa cada 100ms

    });
}

// ✅ INICIO CORRECTO
async function iniciarTodo(){

    try {
        // 🔥 esperar usuario (login real)
        await esperarUsuario();

        // 🔥 cargar datos de Firebase
        await cargarFirebase();

    } catch(e){
        console.log("Firebase falla pero seguimos");
    }

    // ✅ INICIAR JUEGO SIEMPRE
    const params = new URLSearchParams(window.location.search);

    const materia = params.get("materia") || "castellano";
    const nivel = params.get("nivel") || "1";

    const key = materia + nivel;

    document.getElementById("tituloJuego").innerText =
        materia.toUpperCase() + " - Nivel " + nivel;

    iniciarJuego(key);

    document.getElementById("btnComprobar").onclick = comprobar;
}

// ✅ ARRANQUE
window.onload = iniciarTodo;

</script>

</body>
</html>
