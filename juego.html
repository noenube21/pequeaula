<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>PEQUE AULA 🌟</h1>
<h2 id="tituloJuego"></h2>

<div class="game-box">
    <div id="pregunta"></div>
</div>

<script type="module">
import { iniciarJuego } from "./js/juegos-master.js";

const p = new URLSearchParams(location.search);
const materia = p.get("materia");
const nivel = p.get("nivel");

document.getElementById("tituloJuego").innerText =
    materia + " - Nivel " + nivel;

window.onload = () => {
    iniciarJuego(materia + nivel);
};
</script>

</body>
</html>
