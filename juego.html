<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-box {
            width: 500px;
            max-width: 90%;
        }

        #pregunta {
            font-size: 22px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #zona button {
            display: block;
            width: 80%;
            margin: 8px auto;
        }

        #respuesta {
            width: 80%;
            margin: 10px auto;
            display: none; /* ✅ FIX: oculto hasta que toque */
        }

        #btnComprobar {
            display: none; /* ✅ FIX: solo en input */
        }
    </style>
</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<h2 id="tituloJuego"></h2>

<div id="score">Puntos: 0</div>

<div class="game-box">

    <div id="pregunta"></div>

    <div id="zona"></div>

    <input id="respuesta" type="text">

    <button id="btnComprobar">Comprobar</button>

    <p id="resultado"></p>

</div>

<script type="module">

import { iniciarJuego, comprobar, cargarFirebase } from "./js/juegos-master.js";
import { auth } from "./firebase-config.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

// ✅ función para arrancar juego BIEN
function arrancarJuego(){

    const params = new URLSearchParams(window.location.search);

    const materia = params.get("materia") || "castellano";
    const nivel = params.get("nivel") || "1";

    const key = materia + nivel;

    document.getElementById("tituloJuego").innerText =
        materia.toUpperCase() + " - Nivel " + nivel;

    iniciarJuego(key);

    // ✅ botón controlar
    document.getElementById("btnComprobar").onclick = comprobar;

    // ✅ enter para escribir (muy importante)
    document.getElementById("respuesta").addEventListener("keypress", (e)=>{
        if(e.key === "Enter"){
            comprobar();
        }
    });
}

let yaArrancado = false;

// ✅ ESPERA REAL a Firebase (CLAVE)
onAuthStateChanged(auth, async (user) => {

    if(user){
        await cargarFirebase(); // 🔥 SIEMPRE primero Firebase
    }

    if(!yaArrancado){
        yaArrancado = true;
        arrancarJuego();
    }
});

// ✅ fallback (por si Firebase tarda)
setTimeout(() => {
    if(!yaArrancado){
        yaArrancado = true;
        arrancarJuego();
    }
}, 1500);

</script>

</body>
</html>
