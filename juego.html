<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- BOTÓN VOLVER -->
<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<!-- TÍTULO -->
<h2 id="tituloJuego"></h2>

<!-- PUNTOS -->
<div id="score">Puntos: 0</div>

<!-- CAJA DEL JUEGO -->
<div class="game-box">

    <div id="pregunta"></div>

    <div id="zona"></div>

    <input id="respuesta" type="text">

    <button id="btnComprobar">Comprobar</button>

    <p id="resultado"></p>

</div>

<!-- SCRIPT -->
<script type="module">

import { iniciarJuego, comprobar, cargarDesdeFirebase } from "./js/juegos-master.js";

// ✅ ARRANQUE SEGURO
window.onload = () => {

    try {

        const params = new URLSearchParams(window.location.search);

        const materia = params.get("materia") || "castellano";
        const nivel = params.get("nivel") || "1";

        const key = materia + nivel;

        console.log("KEY:", key);

        // ✅ PONER TÍTULO
        document.getElementById("tituloJuego").innerText =
            materia.toUpperCase() + " - Nivel " + nivel;

        // ✅ CARGAR FIREBASE (NO BLOQUEA)
        cargarDesdeFirebase();

        // ✅ INICIAR JUEGO
        iniciarJuego(key);

        // ✅ BOTÓN
        document.getElementById("btnComprobar").onclick = comprobar;

    } catch (error) {

        console.error("Error general:", error);
        document.getElementById("pregunta").innerText = "Error cargando juego";

    }

};

</script>

</body>
</html>
``
