<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-box {
            width: 500px;
            max-width: 90%;
        }

        #pregunta {
            font-size: 22px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #zona button {
            display: block;
            width: 80%;
            margin: 8px auto;
        }

        #respuesta {
            width: 80%;
            margin: 10px auto;
            display: block;
        }
    </style>

</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<h2 id="tituloJuego"></h2>

<div id="score">Puntos: 0</div>

<div class="game-box">

    <div id="pregunta"></div>

    <div id="zona"></div>

    <input id="respuesta" type="text">

    <button id="btnComprobar">Comprobar</button>

    <p id="resultado"></p>

</div>

<script type="module">

import { iniciarJuego, comprobar } from "./js/juegos-master.js";

window.onload = () => {

    const params = new URLSearchParams(window.location.search);

    const materia = params.get("materia") || "castellano";
    const nivel = params.get("nivel") || "1";

    const key = materia + nivel;

    // ✅ título
    document.getElementById("tituloJuego").innerText =
        materia.toUpperCase() + " - Nivel " + nivel;

    // ✅ iniciar juego como antes (esto es lo que hace que funcione)
    iniciarJuego(key);

    // ✅ botón
    document.getElementById("btnComprobar").onclick = comprobar;
};

</script>

</body>
</html>
