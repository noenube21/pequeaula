<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<h2 id="tituloJuego"></h2>

<div id="score">Puntos: 0</div>

<div class="game-box">

    <div id="pregunta" class="pregunta"></div>

    <div id="zona"></div>

    <input id="respuesta" type="text" placeholder="Escribe tu respuesta">

    <button id="btnComprobar">Comprobar</button>

    <p id="resultado"></p>

</div>

<script type="module">

import { iniciarJuego, comprobar } from "./js/juegos-master.js";

window.onload = () => {

    const params = new URLSearchParams(location.search);
    const materia = params.get("materia");
    const nivel = params.get("nivel");

    if (!materia || !nivel) {
        document.getElementById("pregunta").innerText = "Error cargando";
        return;
    }

    document.getElementById("tituloJuego").innerText =
        materia.toUpperCase() + " - Nivel " + nivel;

    iniciarJuego(materia + nivel);

    document.getElementById("btnComprobar").onclick = comprobar;
};

</script>

</body>
</html>
