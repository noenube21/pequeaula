<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <!-- ✅ RESPONSIVE (CLAVE) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Juego</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ✅ BOTÓN MEJOR POSICIONADO -->
<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<header class="topbar">
    <span class="logo">PEQUE AULA</span>
</header>

<h2 id="tituloJuego" class="titulo-juego"></h2>

<!-- ✅ AÑADIMOS PUNTUACIÓN (MUY IMPORTANTE) -->
<div id="score">Puntos: 0</div>

<div class="game-box">

    <div id="pregunta" class="pregunta"></div>

    <div id="zona"></div>

    <input id="respuesta" type="text" placeholder="Escribe tu respuesta">

    <button id="btnComprobar">Comprobar</button>

    <p id="resultado"></p>
</div>

<!-- ✅ VARIABLES DEL JUEGO -->
<script>
    const paramsJuego = new URLSearchParams(location.search);
    var materia = paramsJuego.get("materia");
    var nivel   = paramsJuego.get("nivel");
</script>

<!-- ✅ JS MEJORADO -->
<script type="module">
    import { iniciarJuego, comprobar, actualizarPuntos } from "./js/juegos-master.js";

    // ✅ Título más seguro
    if (materia && nivel) {
        document.getElementById("tituloJuego").innerText =
            materia.toUpperCase() + " - Nivel " + nivel;
    }

    // ✅ iniciar juego
    iniciarJuego(materia + nivel);

    // ✅ comprobar respuesta
    document.getElementById("btnComprobar").onclick = () => {
        comprobar();
        if (typeof actualizarPuntos === "function") {
            actualizarPuntos();
        }
    };
</script>

</body>
</html>
