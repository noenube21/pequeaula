<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego</title>

css/style.css

<style>
body{
    text-align:center;
}

#pregunta{
    font-size:24px;
    margin:20px;
}

#zona button{
    display:block;
    margin:8px auto;
}

#respuesta{
    display:block;
    width:250px;
    margin:15px auto;
}

#btnComprobar{
    display:block;
    margin:10px auto;
}
</style>
</head>

<body>

<button onclick="history.back()" class="btn-volver">
⬅ Volver
</button>

<h2 id="tituloJuego"></h2>

<div id="score">
Puntos: 0
</div>

<div id="pregunta"></div>

<div id="zona"></div>

<input id="respuesta">

<button id="btnComprobar">
Comprobar
</button>

<p id="resultado"></p>

<!-- ✅ 1. LIBRERÍA SUPABASE -->
https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2

<!-- ✅ 2. TU ARCHIVO SUPABASE -->
js/database.js

<!-- ✅ 3. TU JUEGO -->
js/juegos-master.js>

<!-- ✅ 4. SCRIPT -->
<script>
const params = new URLSearchParams(window.location.search);

const materia = params.get("materia") || "matematicas";
const nivel = params.get("nivel") || "1";

document.getElementById("tituloJuego").innerText =
materia + " nivel " + nivel;

// ✅ iniciar juego
window.iniciarJuego(materia + nivel);

// ✅ comprobar
document.getElementById("btnComprobar").onclick = function(){
window.comprobar();
};

// ✅ ENTER
document.getElementById("respuesta").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
window.comprobar();
}
});
</script>

</body>
</html>
