<!DOCTYPE html>
<html lang="es">
<head-8"><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego</title>

<style>
body{ text-align:center; }
#respuesta{ margin:10px; }
</style>

</head>
<body>

<h2 id="tituloJuego"></h2>
<div id="score">Puntos: 0</div>

<div id="pregunta"></div>

<input id="respuesta">
<button id="btnComprobar">Comprobar</button>

<p id="resultado"></p>

<script type="module">
import { iniciarJuego, comprobar, cargarFirebase } from "./js/juegos-master.js";
import { auth } from "./firebase-config.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const materia = params.get("materia") || "matematicas";
const nivel = params.get("nivel") || "1";

document.getElementById("tituloJuego").innerText =
    materia + " nivel " + nivel;

onAuthStateChanged(auth, async (user)=>{
    if(user) await cargarFirebase();
    iniciarJuego(materia+nivel);
});

document.getElementById("btnComprobar").onclick = comprobar;

document.getElementById("respuesta").addEventListener("keydown",(e)=>{
    if(e.key==="Enter") comprobar();
});
</script>

</body>
</html>
