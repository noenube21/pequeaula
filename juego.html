<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    text-align:center;
}

#pregunta{
    font-size:24px;
    margin:20px;
}

#zona button{
    display:block;
    margin:8px auto;
}

/* INPUT CENTRADO */
#respuesta{
    display:block;
    width:250px;
    margin:15px auto;
}

/* BOTÓN CENTRADO */
#btnComprobar{
    display:block;
    margin:10px auto;
}
</style>

</head>

<body>

<button onclick="history.back()" class="btn-volver">
    ⬅ Volver
</button>

<h2 id="tituloJuego"></h2>

<div id="score">
    Puntos: 0
</div>

<div id="pregunta"></div>

<div id="zona"></div>

<input id="respuesta">

<button id="btnComprobar">
    Comprobar
</button>

<p id="resultado"></p>

<!-- ✅ 1. LIBRERÍA SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ✅ 2. TU ARCHIVO SUPABASE -->
<script src="./js/supabase.js"></script>

<!-- ✅ 3. TU JUEGO -->
<script src="./js/juegos-master.js"></script>

<!-- ✅ 4. TU SCRIPT ORIGINAL (SIN MODULE) -->
<script>
const params = new URLSearchParams(window.location.search);

const materia = params.get("materia") || "matematicas";
const nivel = params.get("nivel") || "1";

document.getElementById("tituloJuego").innerText =
    materia + " nivel " + nivel;

// ✅ ahora funciona porque usamos window
window.iniciarJuego(materia + nivel);

document.getElementById("btnComprobar").onclick = function(){
    window.comprobar();
};

document.getElementById("respuesta").addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        window.comprobar();
    }
});
</script>

</body>
</html>
