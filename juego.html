<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topbar menu-topbar">
    <span class="logo menu-logo">PEQUE AULA 🌟</span>
</header>

<h2 class="center menu-subtitle" id="tituloJuego"></h2>

<div class="game-box">
    <div id="pregunta"></div>
    <div id="zona"></div>

    <input id="respuesta" type="text" placeholder="Escribe tu respuesta">
    <button id="btnComprobar">Comprobar</button>
    <p id="resultado"></p>
</div>

<!-- Firebase (si lo usas realmente) -->
<script type="module" src="js/firebase-config.js"></script>

<!-- JUEGOS -->
<script type="module" src="js/juegos-master.js"></script>

<!-- INICIADOR -->
<script type="module">
    import { iniciarJuego, comprobar } from "./js/juegos-master.js";

    const params = new URLSearchParams(location.search);
    const materia = params.get("materia");
    const nivel = params.get("nivel");

    document.getElementById("tituloJuego").innerText =
        materia.toUpperCase() + " - Nivel " + nivel;

    window.onload = () => {
        iniciarJuego(materia + nivel);
    };

    document.getElementById("btnComprobar").onclick = comprobar;
</script>

</body>
</html>
