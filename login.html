<div class="login-container">

    <!-- CAJA DEL LOGIN -->
    <div class="login-box">

        <h2>Iniciar sesión</h2>

        <form id="form-login" class="login-form">

            <p>Email</p>
            <input type="email" name="email" placeholder="Escribe tu email" required>

            <p>Contraseña</p>
            <input type="password" name="password" placeholder="Escribe tu contraseña" required>

            <button type="submit">Entrar</button>

        </form>

        <!-- ✅ NUEVO: RECUPERAR CONTRASEÑA -->
        <p style="margin-top:10px;">
            <a href="#" onclick="resetPassword()">¿Olvidaste tu contraseña?</a>
        </p>

        <p>¿No tienes cuenta? <a href="registro.html">Crear cuenta</a></p>

    </div>
</div>
