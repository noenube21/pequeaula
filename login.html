<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>

    <!-- ✅ RUTA CORRECTA -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h2>Iniciar sesión</h2>

        <!-- ✅ IMPORTANTE -->
        <form id="form-login" class="login-form">

            <p>Email</p>
            <input type="email" name="email" required>

            <p>Contraseña</p>
            <input type="password" name="password" required>

            <button type="submit">Entrar</button>

        </form>

        <!-- ✅ RECUPERAR CONTRASEÑA -->
        <p>
            <a href="#" onclick="resetPassword()">¿Olvidaste tu contraseña?</a>
        </p>

        <p>
            ¿No tienes cuenta? <a href="registro.html">Crear cuenta</a>
        </p>

    </div>
</div>

<!-- ✅ IMPORTS CORRECTOS (AQUÍ ESTABA EL FALLO) -->
    <script type="module" src="js/auth.js"></script>
<script type="module" src="js/firebase-config.js"></script>

<!-- ✅ NECESARIO PARA resetPassword -->
<script type="module">
    import { resetPassword } from "./js/auth.js";
    window.resetPassword = resetPassword;
</script>

</body>
</html>
