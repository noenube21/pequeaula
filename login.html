<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h2>Iniciar sesión</h2>

        <!-- 🔴 MENSAJES DE ERROR / FEEDBACK -->
        <div id="login-message"></div>

        <form id="form-login" class="login-form">

            <p>Email</p>
            <input type="email" name="email" placeholder="Escribe tu email" required>

            <p>Contraseña</p>
            <input type="password" name="password" placeholder="Escribe tu contraseña" required>

            <button type="submit">Entrar</button>

        </form>

        <!-- ✅ ✅ ✅ SOLO CAMBIO AQUÍ -->
        <p>
            <a href="#" onclick="resetPassword()">¿Has olvidado tu contraseña?</a>
        </p>

        <p>¿No tienes cuenta? <a href="registro.html">Crear cuenta</a></p>

    </div>
</div>

<!-- ✅ ESTO NO SE TOCA -->
<script type="module" src="firebase-config.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
