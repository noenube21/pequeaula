</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<div class="card-container">

        <img src="assets/img/matematicas.png">
        <h3>Mates</h3>
    </div>

    <div class="card" onclick="location.href='niveles.html?materia=castellano'">
        <img src="assets/img/castellano.png">

    <div class="card" onclick="location.href='niveles.html?materia=ingles'">

        <div class="card" onclick="location.href='recompensas.html'">

<div class="card" onclick="location.href='minijuego.html'">

</div>

<!-- BOTÓN CERRAR SESIÓN -->
<div class="center" style="margin-top: 30px;">
    <button class="btn" style="background:#d9534f;" onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<script type="module">
import { auth } from "./js/firebase-config.js";
import { signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

window.cerrarSesion = function () {
    signOut(auth).then(() => {
        location.href = "login.html";
    });
};
</script>
