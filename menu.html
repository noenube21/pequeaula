<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar menu-topbar">
    <span class="logo menu-logo">PEQUE AULA 🌟</span>
    <img id="avatarMenu" class="avatar-small">
</header>

<h2 class="center menu-subtitle">¿Qué quieres practicar hoy?</h2>

<div class="card-container menu-cards">

    <div class="card" onclick="location.href='matematicas.html'">
        <img src="assets/img/matematicas.png">
        <h3>Matemáticas</h3>
    </div>

    <div class="card" onclick="location.href='castellano.html'">
        <img src="assets/img/castellano.png">
        <h3>Castellano</h3>
    </div>

    <div class="card" onclick="location.href='ingles.html'">
="card" onclick="location.href='progreso.html'">
        <img src="assets/img/progreso.png">
        <h3>Progreso</h3>
    </div>

    <div class="card" onclick="location.href='recomprdPadre" class="card" style="display:none" onclick="location.href='padre-dashboard.html'">
        <img src="assets/img/familia.png">
        <h3>Supervisión</h3>
    </div>

</div>

<div class="center menu-bottom">
    <button class="btn-secondary" id="btn-logout">Cerrar sesión</button>
</div>

<script type="module">
    import { auth, db } from "./firebase-config.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const btnLogout = document.getElementById("btn-logout");
    const cardPadre = document.getElementById("cardPadre");

    btnLogout.onclick = async () => {
        await signOut(auth);
        localStorage.removeItem("usuario");
        location.href = "login.html";
    };

    auth.onAuthStateChanged(async (u) => {
        if (!u) return;
        const r = doc(db, "usuarios", u.uid);
        const s = await getDoc(r);
        if (!s.exists()) return;
        const d = s.data();
        if (d.role === "padre") cardPadre.style.display = "block";
    });
</script>

</body>
</html>
