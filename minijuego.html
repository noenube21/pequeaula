<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Minijuego</title>

<link rel="stylesheet" href="css/style.css">

<style>
canvas {
    border: 3px solid black;
    border-radius: 15px;
    background: linear-gradient(#b3e5fc, #ffffff);
    display: block;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

#zonaRecompensas span {
    margin: 5px;
    padding: 6px 10px;
    background: gold;
    border-radius: 10px;
    display: inline-block;
    font-weight: bold;
}
</style>

</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<h2 class="center">🎮 MINIJUEGO CON RECOMPENSAS</h2>

<div class="center">
    <button class="btn" onclick="iniciar()">▶ JUGAR</button>

    <h3>Recompensas:</h3>
    <div id="zonaRecompensas"></div>
</div>

<canvas id="game" width="400" height="500"></canvas>

<script src="js/minijuego.js"></script>

</body>
</html>
