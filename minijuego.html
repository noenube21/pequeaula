<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Minijuego</title>

<link rel="stylesheet" href="css/style.css">

<style>
#zonaRecompensas span {
    margin: 5px;
    padding: 6px 10px;
    background: #ffd54f;
    border-radius: 10px;
    display: inline-block;
    font-weight: bold;
}

canvas {
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<h2 class="center">🎮 MINIJUEGO CON RECOMPENSAS</h2>

<div class="center">

    <button class="btn" onclick="iniciar()">▶ JUGAR</button>

    <p style="font-size:18px;">⭐ Puntos: <span id="puntos">0</span></p>

    <h3>Recompensas desbloqueadas:</h3>
    <div id="zonaRecompensas"></div>

</div>

<div style="text-align:center;">
    <canvas id="game" width="400" height="500"></canvas>
</div>

<script src="js/minijuego.js"></script>

</body>
</html>
