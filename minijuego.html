<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Minijuego</title>

<link rel="stylesheet" href="css/style.css">

<style>
canvas {
    border: 3px solid black;
    border-radius: 15px;
    background: linear-gradient(#b3e5fc, #ffffff);
}

#puntos {
    font-size: 28px;
    font-weight: bold;
}

#vidas {
    font-size: 24px;
}
</style>

</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<h2 class="center">🎮 MINIJUEGO CON RECOMPENSAS</h2>

<div class="center">

    <button class="btn" onclick="iniciar()">▶ JUGAR</button>

    <p>⭐ Puntos: <span id="puntos">0</span></p>
    <p id="vidas">❤️❤️❤️</p>

    <h3>Recompensas:</h3>
    <div id="zonaRecompensas"></div>

</div>

<div style="text-align:center;">
    <canvas id="game" width="400" height="500"></canvas>
</div>

<script src="js/minijuego.js"></script>

</body>
</html>
