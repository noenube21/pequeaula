<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Niveles</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="main-container">

    <h2 class="titulo" id="tituloAsignatura"></h2>

    <div class="card-game">
        <button class="btn" onclick="abrirNivel(1)">Nivel 1 – Fácil</button>
        <button class="btn" onclick="abrirNivel(2)">Nivel 2 – Medio</button>
        <button class="btn" onclick="abrirNivel(3)">Nivel 3 – Difícil</button>
    </div>

    <button class="btn-secondary" onclick="location.href='asignaturas.html'">Volver</button>

</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const asignatura = params.get("asignatura");

    document.getElementById("tituloAsignatura").innerText =
        "Niveles de " + asignatura;

    function abrirNivel(nivel) {
        location.href = `juego-${asignatura}-nivel${nivel}.html`;
    }
</script>

</body>
</html>
