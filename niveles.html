<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Niveles</title>

    css/style.css
</head>

<body>

<button class="btn-volver" onclick="history.back()">⬅ Volver</button>

<header class="topbar">
    <span class="logo">PEQUE AULA 🌟</span>
</header>

<h2 class="menu-subtitle" id="titulo"></h2>

<div class="card-container">

    <div class="card" onclick="jugar(1)">
        assets/img/nivel1.png
        <h3>Nivel 1</h3>
    </div>

    <div class="card" onclick="jugar(2)">
        assets/img/nivel2.png
        <h3>Nivel 2</h3>
    </div>

    <div class="card" onclick="jugar(3)">
        assets/img/nivel3.png
        <h3>Nivel 3</h3>
    </div>

</div>

<script>
const params = new URLSearchParams(location.search);
const materia = params.get("materia");

document.getElementById("titulo").innerText =
    "Elige un nivel de " + materia.toUpperCase();

function jugar(nivel){
    location.href = `juego.html?materia=${materia}&nivel=${nivel}`;
}
</script>

</body>
</html>
