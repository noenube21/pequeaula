<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Niveles</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar menu-topbar">
    <span class="logo menu-logo">PEQUE AULA 🌟</span>
</header>

<h2 class="center menu-subtitle" id="titulo"></h2>

<div class="card-container menu-cards">

    <div class="card" onclick="jugar(1)">
        <img src="assets/img/nivel1.png">
        <h3>Nivel 1</h3>
    </div>

    <div class="card" onclick="jugar(2)">
        <img src="assets/img/nivel2.png">
        <h3>Nivel 2</h3>
    </div>

    <div class="card" onclick="jugar(3)">
        <img src="assets/img/nivel3.png">
        <h3>Nivel 3</h3>
    </div>

</div>

<script>
const p = new URLSearchParams(location.search);
const materia = p.get("materia");

document.getElementById("titulo").innerText =
    "Elige un nivel de " + materia.toUpperCase();

function jugar(n) {
    location.href = `juego.html?materia=${materia}&nivel=${n}`;
}
</script>

</body>
</html>
