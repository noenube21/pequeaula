<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h2>Crear cuenta</h2>

        <!-- 🔴 MENSAJES DE ERROR / FEEDBACK -->
        <div id="login-message"></div>

        <form id="form-registro" class="login-form">

            <p>Nombre del alumno</p>
            <input type="text" name="nombre" placeholder="Escribe tu nombre" required>

            <p>Email</p>
            <input type="email" name="email" placeholder="Escribe tu email" required>

            <p>Contraseña</p>
            <input type="password" name="password" placeholder="Escribe tu contraseña" required>

            <!-- 🧠 AVATARES MEJORADOS (lo que pide el profesor) -->
            <p>Elige tu avatar</p>

            <div class="avatar-container">

                <label>
                    <input type="radio" name="avatar" value="chico" required>
                    <img src="img/avatar-chico.png" alt="Chico" width="70">
                </label>

                <label>
                    <input type="radio" name="avatar" value="chica">
                    <img src="img/avatar-chica.png" alt="Chica" width="70">
                </label>

                <label>
                    <input type="radio" name="avatar" value="neutro">
                    <img src="img/avatar-neutro.png" alt="Neutro" width="70">
                </label>

            </div>

            <button type="submit">Crear cuenta</button>

        </form>

        <p>¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>

    </div>

</div>

<!-- Scripts reales -->
<script type="module" src="firebase-config.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
