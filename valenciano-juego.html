<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Valenciano</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<button class="btn-volver" onclick="history.back()">
    ⬅ Volver
</button>

<header class="topbar">
    <span class="logo">PEQUE AULA 🌟</span>
</header>

<div class="game-box">

    <h1 id="tituloJuego">Valenciano</h1>

    <div id="score">Puntos: 0</div>

    <div id="pregunta"></div>

    <div id="zona"></div>

    <input id="respuesta" type="text">

    <button id="btnComprobar" onclick="comprobar()">
        Comprobar
    </button>

    <div id="resultado"></div>

</div>

<script type="module">

import {
    iniciarJuego,
    comprobar,
    cargarValenciano
} from "./js/juegos-master.js";

window.comprobar = comprobar;

// 🔥 ARRANQUE SEGURO CON JSON
(async () => {
    await cargarValenciano();   // carga JSON
    await iniciarJuego("valenciano1"); // inicia juego
})();

</script>

</body>
</html>
