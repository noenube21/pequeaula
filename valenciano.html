<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valenciano</title>
</head>
<body>

    <h1>Valenciano</h1>

    <div id="score"></div>

    <div id="pregunta"></div>

    <div id="zona"></div>

    <input
        type="text"
        id="respuesta"
        placeholder="Escribe tu respuesta"
        autocomplete="off"
    >

    <button onclick="comprobar()">
        Comprobar
    </button>

    <div id="resultado"></div>

    <script type="module">
        import {
            iniciarJuego,
            comprobar,
            cargarValenciano
        } from "./js/juegos-master.js";

        window.comprobar = comprobar;

        (async () => {
            await cargarValenciano();     // carga preguntas desde JSON
            await iniciarJuego("valenciano1");
        })();
    </script>

</body>
</html>
